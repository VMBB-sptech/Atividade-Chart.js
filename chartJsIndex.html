<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividade Chart Js</title>
</head>

<body>
    <div style="width: 600px; height: 300px; margin: auto; border-radius: 20px;">
        <canvas id="meuGrafico"></canvas>
    </div>
</body>

</html>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
        const ctx = document.getElementById('meuGrafico');

        new Chart(ctx, {
            type: 'bar', 
            data: {
                labels: ['Janeiro', 'Fevereiro', 'Março', 'Abril', 'Maio', 'Junho'],
                datasets: [
                    {
                        label: 'Temperatura Média',
                        data: [22, 24, 27, 23, 20, 18],
                        backgroundColor: 'rgba(255, 99, 131, 0.8)',
                        borderColor: 'rgba(255, 99, 131, 1)',
                        borderWidth: 1
                    },
                    {
                        label: 'Umidade Média',
                        data: [90, 89, 93, 87, 88, 82],
                        backgroundColor: 'rgba(57, 161, 233, 0.7)',
                        borderColor: 'rgba(57, 161, 233, 1)',
                        borderWidth: 1
                    }
                ]
            },
            options: {
                scales: {
                    y: {
                        beginAtZero: true
                    }
                }
            }
        });
    </script>
