<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividade Chart Js</title>
</head>

<body>
    <div style="width: 600px; height: 300px; margin: auto; border-radius: 20px;">
        <canvas id="meuGrafico"></canvas>
    </div>
</body>

</html>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
        const ctx = document.getElementById('meuGrafico');

        new Chart(ctx, {
            type: 'bar', 
            data: {
                labels: ['Janeiro', 'Fevereiro', 'Março', 'Abril', 'Maio', 'Junho'],
                datasets: [
                    {
                        label: 'Vendas em R$',
                        data: [1200, 1900, 3000, 5000, 2000, 3000],
                        backgroundColor: 'rgba(67, 55 , 253, 0.5)', // Cor de preenchimento
                        borderColor: 'rgba(54, 162, 235, 1)',       // Cor da borda
                        borderWidth: 1
                    },
                    {
                        label: 'Metas de vendas',
                        data: [1500, 2000, 2000, 4000, 1750, 2000],
                        backgroundColor: 'rgba(255, 99, 132, 0.7)', 
                        borderColor: 'rgba(255, 99, 132, 1)',       
                        borderWidth: 1
                    }
                ]
            },
            options: {
                scales: {
                    y: {
                        beginAtZero: true
                    }
                }
            }
        });
    </script>
